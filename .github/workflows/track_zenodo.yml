name: Track Zenodo Stats

on:
  schedule:
    # Runs daily at 06:30 UTC.
    # Germany: 08:30 during summer time, 07:30 during winter time.
    - cron: "30 6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-zenodo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Track Zenodo stats
        run: python scripts/track_zenodo_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/magbridge_zenodo_snapshots.csv data/magbridge_zenodo_daily.csv

          if git diff --cached --quiet; then
            echo "No stats changes to commit."
          else
            git commit -m "Update Zenodo stats snapshot"
            git push
          fi
